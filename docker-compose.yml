version: "3.9"

networks:
  governance-net:
    driver: bridge

volumes:
  postgres-data:
  neo4j-data:
  redis-data:
  cert-keys:

services:
  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  All secrets are REQUIRED from the .env file (no fallbacks).     ║
  # ║  Generate a production-ready .env with:                          ║
  # ║      bash scripts/gen-secrets.sh > .env && chmod 600 .env        ║
  # ║  See DEPLOYMENT.md § 3 for the full checklist.                   ║
  # ╚══════════════════════════════════════════════════════════════════╝
  # ─── PostgreSQL Evidence Store ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: compliance-stack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (run scripts/gen-secrets.sh)}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    # Postgres port intentionally NOT exposed to the host — access it via
    # `docker compose exec postgres psql ...` for backups/admin.
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - governance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 10

  # ─── Neo4j Provenance Graph ────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: compliance-stack-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required (run scripts/gen-secrets.sh)}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    # Neo4j Bolt/HTTP intentionally NOT exposed — use
    # `docker compose exec neo4j cypher-shell -u neo4j -p $$NEO4J_PASSWORD`.
    volumes:
      - neo4j-data:/data
      - ./cypher/init.cypher:/init.cypher:ro
    networks:
      - governance-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${NEO4J_PASSWORD} 'RETURN 1;'"]
      interval: 10s
      retries: 10

  # ─── Redis Async Engine ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: compliance-stack-redis
    restart: unless-stopped
    # Redis intentionally NOT exposed to the host.
    volumes:
      - redis-data:/data
    networks:
      - governance-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # ─── Python FastAPI Backend ─────────────────────────────────────
  python-backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    container_name: compliance-stack-python
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-governance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-governance_secret}
      POSTGRES_DB: ${POSTGRES_DB:-evidence_store}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-governance_secret}
      REDIS_URL: redis://redis:6379/0
      # ╔════════════════════════════════════════════════════════════════╗
      # ║  WARNING: Demo defaults — set strong secrets in .env    ║
      # ║  AUTH_PRIVATE_KEY:  openssl genrsa -out private.pem 2048 ║
      # ║  SIGNING_KEY:       openssl genpkey -algorithm ed25519   ║
      # ╚════════════════════════════════════════════════════════════════╝
      SIGNING_KEY_PRIVATE: ${SIGNING_KEY_PRIVATE:-}
      SIGNING_KEY_PUBLIC: ${SIGNING_KEY_PUBLIC:-}
      AUTH_PRIVATE_KEY_PATH: ${AUTH_PRIVATE_KEY_PATH:-}
      AUTH_PRIVATE_KEY: ${AUTH_PRIVATE_KEY:-}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080,http://localhost:3001}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,python-backend,mcp-server,127.0.0.1}
      DEMO_MODE: ${DEMO_MODE:-true}
      ADV_ENDPOINT_URL: ${ADV_ENDPOINT_URL:-}         # Optional: external LLM endpoint for adversarial testing; empty = local/skipped
      ADV_API_KEY: ${ADV_API_KEY:-}                    # Optional: API key for ADV_ENDPOINT_URL (only needed if set)
      ADV_TARGET_MODEL: ${ADV_TARGET_MODEL:-gpt-4o-mini}  # Model at external endpoint for test generation
      ADV_JUDGE_MODEL: ${ADV_JUDGE_MODEL:-gpt-4o-mini}    # Model at external endpoint for test evaluation
      ADV_EMBEDDING_MODEL: ${ADV_EMBEDDING_MODEL:-all-MiniLM-L6-v2}  # Embedding model (local or external)
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-20}
      RATE_LIMIT_WRITE: ${RATE_LIMIT_WRITE:-60}
      RATE_LIMIT_READ: ${RATE_LIMIT_READ:-120}
      MAX_BODY_SIZE: ${MAX_BODY_SIZE:-10485760}
      MODEL_DIR: ${MODEL_DIR:-./models}
      DATA_DIR: ${DATA_DIR:-./data}
    ports:
      - "8000:8000"
    networks:
      - governance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      retries: 5

  # ─── Governance Orchestrator (9-phase pipeline) ─────────────────
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: compliance-stack-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      cert-signer:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      GOVERNANCE_JWT_SECRET: ${GOVERNANCE_JWT_SECRET:?GOVERNANCE_JWT_SECRET is required (run scripts/gen-secrets.sh)}
      GOVERNANCE_TOKEN_TTL_MINUTES: ${GOVERNANCE_TOKEN_TTL_MINUTES:-60}
      GOV_ADMIN_SECRET: ${GOV_ADMIN_SECRET:?GOV_ADMIN_SECRET is required}
      GOV_INTAKE_SECRET: ${GOV_INTAKE_SECRET:?GOV_INTAKE_SECRET is required}
      GOV_AUDIT_SECRET: ${GOV_AUDIT_SECRET:?GOV_AUDIT_SECRET is required}
      GOV_CERT_SECRET: ${GOV_CERT_SECRET:?GOV_CERT_SECRET is required}
      GOV_TRUSTED_ISSUER_DIDS: ${GOV_TRUSTED_ISSUER_DIDS:-}
      CERT_SIGNER_URL: http://cert-signer:8020
      GOVERNANCE_PUBLIC_BASE_URL: ${GOVERNANCE_PUBLIC_BASE_URL:-http://localhost:8010}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Google Sign-In (Emergent-managed OAuth). Requires egress to
      # auth.emergentagent.com + demobackend.emergentagent.com. Fully hidden
      # by mcp-server if HIDE_GOOGLE_SIGNIN=1.
      # ALLOW-LIST (SEC-002): if both empty AND NODE_ENV=production the
      # orchestrator refuses to boot. Format: "user@example.com=role,..."
      GOOGLE_ALLOWED_EMAILS: ${GOOGLE_ALLOWED_EMAILS:-}
      GOOGLE_ALLOWED_DOMAINS: ${GOOGLE_ALLOWED_DOMAINS:-}
      # Testing escape hatch (never set in production; boot refuses when
      # NODE_ENV=production AND this is 1).
      NODE_ENV: ${NODE_ENV:-production}
      GOV_ALLOW_TEST_AUTH: ${GOV_ALLOW_TEST_AUTH:-0}
      GOOGLE_AUTH_TEST_SESSION_ID: ${GOOGLE_AUTH_TEST_SESSION_ID:-}
      GOOGLE_AUTH_TEST_SESSION_TOKEN: ${GOOGLE_AUTH_TEST_SESSION_TOKEN:-}
      GOOGLE_AUTH_TEST_EMAIL: ${GOOGLE_AUTH_TEST_EMAIL:-}
    ports:
      - "8010:8010"
    networks:
      - governance-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8010/health')\""]
      interval: 15s
      retries: 5

  # ─── Certificate Signing Service (internal-only, holds Ed25519 key) ─
  cert-signer:
    build:
      context: .
      dockerfile: certs/Dockerfile
    container_name: compliance-stack-cert-signer
    restart: unless-stopped
    volumes:
      - cert-keys:/keys
    networks:
      - governance-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8020/health')\""]
      interval: 15s
      retries: 5

  # ─── TypeScript MCP Server (Auditor Workbench SPA + MCP transport) ─
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: compliance-stack-mcp
    restart: unless-stopped
    depends_on:
      python-backend:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    environment:
      PYTHON_BACKEND_URL: http://python-backend:8000
      GOVERNANCE_API_URL: http://orchestrator:8010
      GOVERNANCE_CLIENT_ID: ${GOVERNANCE_CLIENT_ID:-governance-admin}
      GOVERNANCE_CLIENT_SECRET: ${GOVERNANCE_CLIENT_SECRET:?GOVERNANCE_CLIENT_SECRET is required (usually =${GOV_ADMIN_SECRET})}
      NODE_ENV: ${NODE_ENV:-production}
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HTTP_HOST: ${MCP_HTTP_HOST:-0.0.0.0}
      PORT: ${MCP_PORT:-3000}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-}
      # Hide the Google Sign-In button entirely on air-gapped installs.
      HIDE_GOOGLE_SIGNIN: ${HIDE_GOOGLE_SIGNIN:-0}
    ports:
      - "${MCP_PORT:-3000}:${MCP_PORT:-3000}"
    stdin_open: true
    tty: true
    command: ["node", "dist/index.js"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${MCP_PORT:-3000}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - governance-net

  # ─── Web UI ──────────────────────────────────────────────────────
  web-ui:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: compliance-stack-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - governance-net
